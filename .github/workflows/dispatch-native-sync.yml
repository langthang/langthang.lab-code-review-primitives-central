name: dispatch-native-sync

on:
  push:
    branches: [ main ]
    paths:
      - instructions/**
      - config/repo-map.json
      - scripts/sync-native-instructions.sh

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        include:
          - repo: langthang/langthang.lab-ms-sal
            key: langthang.lab-ms-sal
          - repo: langthang/langthang.lab-ms-fulfillment
            key: langthang.lab-ms-fulfillment
          - repo: langthang/langthang.lab-lib-fulfillment
            key: langthang.lab-lib-fulfillment
    steps:
      - name: Trigger repository_dispatch in target repo
        env:
          GH_TOKEN: ${{ secrets.CENTRAL_DISPATCH_PAT }}
        run: |
          gh api repos/${{ matrix.repo }}/dispatches --input - <<EOF
          {
            "event_type": "copilot-native-sync",
            "client_payload": {
              "target_key": "${{ matrix.key }}",
              "central_ref": "${{ github.sha }}",
              "central_repo": "${{ github.repository }}"
            }
          }
          EOF